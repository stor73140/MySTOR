<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STOR | Gestion de Stock</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="loginScreen" class="screen">
    <div class="card">
        <h1>STOR</h1>
        <p class="subtitle">SOCIÉTÉ DES TÉLÉPHÉRIQUES D'ORELLE</p>
        <input id="login" placeholder="Identifiant">
        <input id="password" type="password" placeholder="Mot de passe">
        <button onclick="login()">Connexion</button>
        <p id="loginMsg" style="color: red;"></p>
    </div>
</div>

<div id="appScreen" class="screen hidden">
    <header>
        <span class="brand">STOR</span>
        <button onclick="logout()">Déconnexion</button>
    </header>

    <nav class="grid-nav">
        <div class="nav-item" onclick="showTab('meca')"><span>🔧 Méca</span></div>
        <div class="nav-item" onclick="showTab('elec')"><span>⚡ Élec</span></div>
        <div class="nav-item" onclick="showTab('add')"><span>➕ Ajouter</span></div>
        <div id="adminTab" class="nav-item hidden" onclick="showTab('admin')"><span>⚙️ Admin</span></div>
    </nav>

    <section id="meca" class="tab hidden">
        <h3>Stock Mécanique</h3>
        <div id="mecaList">Chargement...</div>
    </section>

    <section id="elec" class="tab hidden">
        <h3>Stock Électrique</h3>
        <div id="elecList">Chargement...</div>
    </section>

    <section id="add" class="tab hidden">
        <h3>Ajouter une pièce</h3>
        <select id="stockType">
            <option value="meca">Mécanique</option>
            <option value="elec">Électrique</option>
        </select>
        <input id="type" placeholder="Type (ex: Roulement)">
        <input id="designation" placeholder="Désignation">
        <input id="quantite" type="number" placeholder="Quantité">
        <input id="emplacement" placeholder="Emplacement">
        <button onclick="addPiece()">Valider l'ajout</button>
        <p id="addMsg"></p>
    </section>
</div>

<script src="app.js"></script>
</body>
</html>
