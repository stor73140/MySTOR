<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STOR | Gestion de Stock</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="loginScreen" class="screen">
    <div class="card">
        <img src="icon.png" alt="LOGO-STOR" class="app-logo">
        <h1>MySTOR</h1>
        <p class="subtitle">Gestion de Stock</p>
        <input id="login" placeholder="Identifiant">
        <input id="password" type="password" placeholder="Mot de passe">
        <button onclick="login()">Se connecter</button>
        <p id="loginMsg" style="color:#ff4d4d; font-size:14px;"></p>
    </div>
</div>

<div id="appScreen" class="screen hidden" style="display:block; padding:0;">
    <header>
        <span style="font-weight:900; color:var(--primary)">MySTOR</span>
        <button onclick="logout()" style="width:auto; padding:8px 15px; font-size:12px; background:#2d333b">Quitter</button>
    </header>

    <div class="main-container">
        <div class="grid-nav" style="display:grid; grid-template-columns: repeat(3, 1fr); gap:10px; margin-bottom:20px;">
            <button onclick="showTab('meca')">🔧</button>
            <button onclick="showTab('elec')">⚡</button>
            <button onclick="showTab('add')">➕</button>
            <button onclick="showTab('searchTab')">🔍 Recherche</button>
            <button id="adminTab" class="hidden" onclick="showTab('admin')">⚙️ Admin</button>
        </div>

        <section id="meca" class="tab hidden">
    <div class="search-container">
        <input type="text" id="searchMeca" placeholder="🔍 Rechercher en mécanique..." onkeyup="filterStock('meca')">
    </div>
    <div id="mecaList">Chargement du stock...</div>
</section>

<section id="elec" class="tab hidden">
    <div class="search-container">
        <input type="text" id="searchElec" placeholder="🔍 Rechercher en électrique..." onkeyup="filterStock('elec')">
    </div>
    <div id="elecList">Chargement du stock...</div>
</section>
<section id="searchTab" class="tab hidden">
    <div class="card-add" style="margin-bottom: 20px;">
        <h3>Recherche Avancée</h3>
        <input type="text" id="globalSearch" placeholder="🔍 Nom de la pièce..." onkeyup="advancedSearch()">
        
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px;">
            <select id="filterType" onchange="advancedSearch()">
                <option value="">Tous les types</option>
            </select>
            <select id="filterPlace" onchange="advancedSearch()">
                <option value="">Tous les lieux</option>
            </select>
        </div>
    </div>
    
    <div id="searchResultList">
        <p style="text-align:center; color:var(--text-dim);">Entrez un nom ou choisissez un filtre</p>
    </div>
</section>
<section id="add" class="tab hidden">
    <div class="card-add">
        <h3>Nouvelle Pièce</h3>
        <select id="stockType">
            <option value="meca">Mécanique</option>
            <option value="elec">Électrique</option>
        </select>
        <select id="type">
    <option value="">Chargement des types...</option>
</select>
        <input id="designation" placeholder="Désignation">
        <input id="quantite" type="number" placeholder="Quantité initiale">
        
        <select id="emplacement">
            <option value="">Sélectionner un emplacement...</option>
        </select>
        
        <button onclick="addPiece()">Valider l'ajout</button>
        <p id="addMsg"></p>
    </div>
</section>

<script src="app.js"></script>
</body>
</html>
